[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function

# Performance options for older machines
# Uncomment to limit memory usage:
# addopts = --tb=short --maxfail=5
# Use -n 1 to disable parallel execution (requires pytest-xdist)
